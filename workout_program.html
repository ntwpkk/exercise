## วอร์มอัพ (8–10 นาที)

1. **หมุนแขนวงกลม (Arm Circles)** — หมุนไปข้างหน้า 10 รอบ + หมุนไปข้างหลัง 10 รอบ

| **น้ำหนักเริ่มต้น** | 5 kg/ข้าง |

**ทำไมเลือกท่านี้:**
- Floor Press ลดช่วงการเคลื่อนไหวด้านล่าง (ข้อศอกแตะพื้นแล้วหยุด) → ลดภาระข้อไหล่และข้อศอก เหมาะกับข้อจำกัดข้อศอกซ้าย
- เป็นท่ารวม (ใช้หลายกล้ามเนื้อ) ที่ฝึกอกได้โดยไม่ต้องใช้ม้านั่ง

**วิธีทำ:**
1. นอนหงายบนพื้น เข่างอ เท้าราบกับพื้น
2. จับ dumbbell แต่ละมือ ยกขึ้นเหนือหน้าอก แขนเหยียดตรง
3. ค่อยๆ ลด dumbbell ลง จนข้อศอกแตะพื้นเบาๆ (ท่อนแขนบนทำมุม ~45° กับลำตัว)
4. หยุดสั้นๆ 1 วินาทีที่พื้น (ตัดแรงเหวี่ยง)
5. ดัน dumbbell กลับขึ้นจนแขนเหยียดตรง บีบหน้าอกที่จุดบนสุด
6. หายใจเข้าขาลง หายใจออกขาดัน

**ข้อควรระวัง:**
- ⚠️ **ข้อศอกซ้าย:** เริ่มเบา สังเกตอาการ ถ้าเจ็บให้ลดน้ำหนักหรือหยุด

## ท่าที่ 2: Shoulder Press Machine (เครื่องกดไหล่)

| รายละเอียด | ค่า |
|-----------|-----|
| **กล้ามเนื้อที่ฝึก** | ไหล่ (ทุกส่วน โดยเฉพาะไหล่ด้านหน้าและด้านข้าง), กล้ามเนื้อต้นแขนหลัง (Triceps), กล้ามเนื้อบ่าส่วนบน |
| **Sets × Reps** | 3 × 10–12 |
| **พัก** | 90 วินาที |
| **น้ำหนักเริ่มต้น** | 10 kg |

**ทำไมเลือกท่านี้:**
- ฝึกไหล่ครบทุกส่วนในท่าเดียว
- ใช้เครื่องจักรจึงปลอดภัยสำหรับมือใหม่ ไม่ต้องห่วงเรื่องทรงตัว

**วิธีทำ:**
1. ปรับเบาะให้หลังพิงตรง เท้าราบกับพื้น
2. จับมือจับในตำแหน่งที่สบาย
3. ดันขึ้นจนแขนเกือบเหยียดตรง (ไม่ล็อกข้อศอก)
4. ค่อยๆ ลดลงมาจนมือจับอยู่ระดับหู–คาง
5. หายใจออกขาดัน หายใจเข้าขาลง
6. เกร็งท้องตลอด อย่าแอ่นหลัง

**ข้อควรระวัง:**
- ⚠️ **ข้อศอกซ้าย:** สังเกตอาการ ท่านี้เป็นการดันเหนือหัว — ถ้ารู้สึกเจ็บข้อศอกให้ลดช่วงการเคลื่อนไหวหรือลดน้ำหนัก
- ไม่ต้องล็อกข้อศอกที่จุดบนสุด

## ท่าที่ 3: Dumbbell Lateral Raise (ยกดัมเบลด้านข้าง)

| รายละเอียด | ค่า |
|-----------|-----|
| **กล้ามเนื้อที่ฝึก** | ไหล่ด้านข้าง (Middle Deltoid) |
| **Sets × Reps** | 3 × 12–15 |
| **พัก** | 60 วินาที |
| **น้ำหนักเริ่มต้น** | 3 kg/ข้าง |

**ทำไมเลือกท่านี้:**
- เป็นท่าเดี่ยว (เน้นกล้ามเนื้อเดียว) ที่ปั้นไหล่ให้กว้างโดยเฉพาะ
- ไม่สร้างภาระข้อศอกมาก

**วิธีทำ:**
1. ยืนตรง เท้ากว้างเท่าไหล่ จับ dumbbell ข้างลำตัว ฝ่ามือหันเข้า
2. เกร็งท้องเล็กน้อย ไม่โยกตัว
3. ยก dumbbell ออกด้านข้างพร้อมกัน ข้อศอกงอเล็กน้อย (~10–15°)
4. ยกจนแขนขนานพื้น (ระดับไหล่) — ไม่สูงกว่านี้เพื่อลดความเสี่ยงเส้นเอ็นถูกหนีบในข้อไหล่
5. หยุดสั้นๆ 1 วินาที บีบไหล่ด้านข้าง
6. ค่อยๆ ลดลงมาช้าๆ (ช่วงปล่อยน้ำหนักลง 2–3 วินาที)
7. นึกภาพ "เทน้ำจากแก้ว" — นิ้วก้อยสูงกว่านิ้วโป้งเล็กน้อย

**ข้อควรระวัง:**
- อย่ายกไหล่ขึ้น (จะกลายเป็นกล้ามเนื้อบ่าทำงานแทน)
- ถ้าน้ำหนักเบาเกินไปให้เพิ่มจำนวนครั้งก่อน ค่อยเพิ่มน้ำหนัก

## ท่าที่ 4: Cable Tricep Pushdown (กดสายเคเบิลฝึกต้นแขนหลัง)

| รายละเอียด | ค่า |
|-----------|-----|
| **กล้ามเนื้อที่ฝึก** | กล้ามเนื้อต้นแขนหลัง (Triceps) |
| **Sets × Reps** | 3 × 12–15 |
| **พัก** | 60 วินาที |
| **น้ำหนักเริ่มต้น** | 5–7.5 kg |

**ทำไมเลือกท่านี้:**
- ฝึก Triceps โดยไม่ต้องยกเหนือหัว → หลีกเลี่ยงอาการเจ็บข้อศอกในท่ายืดแขนเหนือศีรษะ

**วิธีทำ:**
1. ยืนหน้าเครื่อง Cable ปรับรอกขึ้นสูงสุด ใส่ straight bar หรือเชือก (rope)
2. จับ bar/rope ข้อศอกชิดลำตัว งอ ~90°
3. กดลงมาจนแขนเหยียดตรง บีบ Triceps ที่จุดล่างสุด 1 วินาที
4. ค่อยๆ ปล่อยกลับขึ้นช้าๆ (ช่วงปล่อยน้ำหนักลง 2 วินาที) จนข้อศอกงอ ~90°
5. ท่อนแขนบนอยู่นิ่งชิดลำตัวตลอด — เคลื่อนเฉพาะท่อนแขนล่าง
6. ลำตัวเอนไปข้างหน้าเล็กน้อย

**ข้อควรระวัง:**
- ⚠️ **ข้อศอกซ้าย:** เริ่มน้ำหนักเบา สังเกตทุกครั้ง — ถ้าเจ็บให้ลดน้ำหนักหรือเปลี่ยนเป็นเชือก (neutral grip — ฝ่ามือหันเข้าหากัน อาจสบายกว่า)
- อย่าใช้แรงเหวี่ยงโยกตัว

## ท่าที่ 5: Cable Lat Pulldown (ดึงสายเคเบิลฝึกหลัง)

| รายละเอียด | ค่า |
|-----------|-----|
| **กล้ามเนื้อที่ฝึก** | กล้ามเนื้อหลังกว้าง (Latissimus Dorsi), กล้ามเนื้อต้นแขนหน้า (Biceps), กล้ามเนื้อบ่าส่วนล่าง |
| **Sets × Reps** | 3 × 10–12 |
| **พัก** | 90 วินาที |
| **น้ำหนักเริ่มต้น** | 15 kg |

**ทำไมเลือกท่านี้:**
- เพิ่มท่าดึงในวันที่เน้นดัน เพื่อให้ปริมาณฝึกสมดุลและรักษาสุขภาพไหล่

**วิธีทำ:**
1. นั่งที่เครื่อง Cable Pulldown ขาล็อกใต้แผ่นกัน (ถ้ามี)
2. จับ bar กว้างกว่าไหล่เล็กน้อย ฝ่ามือคว่ำ
3. อกยืด ดึงไหล่ลงไม่ให้ยกขึ้น ก่อนเริ่มดึง
4. ดึง bar ลงมาที่ระดับอกบน โดยศอกชี้ลงและไปข้างหลังเล็กน้อย
5. บีบสะบักเข้าหากันที่จุดล่างสุด 1 วินาที
6. ค่อยๆ ปล่อยกลับขึ้นช้าๆ ยืดแขนจนสุด (ยืดกล้ามเนื้อหลัง)
7. หายใจออกขาดึง หายใจเข้าขาปล่อย

**ข้อควรระวัง:**
- อย่าดึง bar ไปด้านหลังศีรษะ — ดึงเข้าหน้าอกเสมอ
- อย่าเอนตัวหลังมากเกิน (เอนเล็กน้อย ~10–15° พอ)

## ท่าที่ 6: Cable Face Pull (ดึงสายเคเบิลเข้าหน้า)

| รายละเอียด | ค่า |
|-----------|-----|
| **กล้ามเนื้อที่ฝึก** | ไหล่ด้านหลัง, กล้ามเนื้อหมุนไหล่ออก (Rotator Cuff), กล้ามเนื้อบ่าส่วนกลาง |
| **Sets × Reps** | 3 × 15–20 |
| **พัก** | 60 วินาที |
| **น้ำหนักเริ่มต้น** | 5 kg |

**ทำไมเลือกท่านี้:**
- ฝึกกล้ามเนื้อหมุนไหล่ออก + ไหล่ด้านหลัง → สำคัญมากสำหรับสุขภาพไหล่ โดยเฉพาะคนนั่งโต๊ะ

**วิธีทำ:**
1. ปรับรอก Cable ระดับหน้า (สูงกว่าศีรษะเล็กน้อย)
2. ใช้เชือก (rope attachment) จับปลายเชือกทั้งสองข้าง
3. ยืนตรง เท้ากว้างเท่าไหล่ ถอยหลังเล็กน้อยให้สายตึง
4. ดึงเชือกมาที่ระดับหน้าผาก–จมูก แยกมือออกจากกัน
5. **หมุนมือออกด้านข้าง** ที่จุดสุด: ให้ท่อนแขนบนตั้งฉากกับลำตัว
6. บีบสะบักเข้าหากัน ค้าง 1–2 วินาที
7. ค่อยๆ ปล่อยกลับ

**ข้อควรระวัง:**
- อย่าใช้น้ำหนักหนักเกิน ท่านี้เน้นการจดจ่อรู้สึกว่ากล้ามเนื้อเป้าหมายทำงาน ไม่ใช่ยกหนัก
- อย่ายกไหล่ขึ้น — เน้นบีบสะบักเข้าและดึงไหล่ลง

## คาร์ดิโอ — วัน Upper (15–20 นาที)

| รายละเอียด | ค่า |
|-----------|-----|
| **อุปกรณ์** | Elliptical (แนะนำ) หรือ ลู่วิ่ง เดิน/วิ่งเหยาะ |
| **ความหนัก** | Zone 2 (ระดับเบา พูดเป็นประโยคได้) — 60–70% ของอัตราหัวใจสูงสุด |
| **อัตราหัวใจเป้าหมาย** | 115–134 bpm (อายุ 29: อัตราหัวใจสูงสุด ≈ 191) |
| **ระยะเวลา** | เริ่ม 15 นาที → ค่อยเพิ่มเป็น 20 นาที |

**ทำไมเลือกระดับนี้:** Zone 2 เหมาะสมที่สุดสำหรับเผาไขมัน ไม่กระทบการฟื้นตัวจากยกน้ำหนัก

**วิธีทำ:**
1. เริ่ม 3 นาทีแรก pace เบาๆ (วอร์มอัพ)
2. เพิ่มความเร็ว/แรงต้านจนเข้า Zone 2 — รู้สึกออกแรงเล็กน้อย พูดเป็นประโยคได้
3. รักษาความเร็วคงที่ตลอด
4. 2 นาทีสุดท้าย ลดความเร็วลง (คูลดาวน์)

## วอร์มอัพ (8–10 นาที)

1. **Bodyweight Squat ใช้แผ่นรองส้นเท้า** — 10 ครั้ง, วางแผ่นรอง/wedge ใต้ส้นเท้า ย่อลงช้าๆ

## ท่าที่ 1: Dumbbell Goblet Squat ใช้แผ่นรองส้นเท้า

| รายละเอียด | ค่า |
|-----------|-----|
| **กล้ามเนื้อที่ฝึก** | กล้ามเนื้อต้นขาหน้า (Quadriceps — มี 4 มัด), กล้ามเนื้อก้น (Gluteus Maximus), กล้ามเนื้อต้นขาด้านใน |
| **Sets × Reps** | 3 × 10–12 |
| **พัก** | 90 วินาที |
| **น้ำหนักเริ่มต้น** | 10 kg (1 dumbbell) |

**ทำไมเลือกท่านี้:**
- เป็นท่ารวม (ใช้หลายกล้ามเนื้อ) ที่ฝึกขาและก้นพร้อมกัน
- การรองส้นเท้าลดความต้องการการกระดกข้อเท้าขึ้น → เหมาะกับข้อจำกัดข้อเท้าซ้าย
- Goblet position (อุ้ม dumbbell ชิดอก) ช่วยให้ลำตัวตั้งตรง เรียนรู้ form ง่าย

**วิธีทำ:**
1. **วาง wedge/แผ่นน้ำหนักรอง** ใต้ส้นเท้าทั้งสองข้าง (สูง ~2–3 cm)
2. จับ dumbbell ด้านบนแนวตั้ง ทั้งสองมือจับที่หัว dumbbell ชิดหน้าอก
3. ยืนเท้ากว้างกว่าไหล่เล็กน้อย ปลายเท้าหันออก ~15–30°
4. หายใจเข้า เกร็งท้อง ย่อลงโดยดัน **สะโพกถอยหลัง + เข่าดันออก** ตามแนวปลายเท้า
5. ย่อลงลึกเท่าที่ทำได้โดยหลังไม่โค้ง (อย่างน้อยต้นขาขนานพื้น)
6. หยุดสั้นๆ ที่จุดล่างสุด
7. ดันขึ้นผ่านส้นเท้า กลับสู่ท่ายืน บีบก้นที่ด้านบน
8. หายใจออกขาขึ้น

**ข้อควรระวัง:**
- ⚠️ **ข้อเท้าซ้าย:** ใช้แผ่นรองส้นเท้าเสมอ ถ้ารู้สึกยืดข้อเท้ามากเกินให้ลดความลึก
- อย่าให้เข่าหุบเข้าใน — ดันเข่าออกตามแนวปลายเท้า
- รักษาอกยืด ลำตัวตั้งตรงเท่าที่ทำได้

## ท่าที่ 2: Leg Extension (เครื่องเหยียดขา)

| รายละเอียด | ค่า |
|-----------|-----|
| **กล้ามเนื้อที่ฝึก** | กล้ามเนื้อต้นขาหน้า (Quadriceps — ท่าเดี่ยว เน้นเฉพาะต้นขาหน้า) |
| **Sets × Reps** | 3 × 12–15 |
| **พัก** | 60 วินาที |
| **น้ำหนักเริ่มต้น** | 15 kg |

**ทำไมเลือกท่านี้:**
- เป็นท่านั่งเหยียดขา ไม่ต้องยืนรับน้ำหนัก → ไม่ต้องใช้ข้อเท้าเลย ปลอดภัยสำหรับข้อเท้าซ้าย
- ฝึกต้นขาหน้าโดยเฉพาะ เสริมจาก Squat

**วิธีทำ:**
1. นั่งบนเครื่อง ปรับหลังพิงตรง สะโพกชิดพนักพิง
2. ปรับแผ่นกดให้อยู่ด้านหน้าข้อเท้า (เหนือเท้า)
3. จับที่จับข้างเบาะ
4. เหยียดเข่าขึ้นจนขาตรง บีบต้นขาหน้า (Quadriceps) ที่จุดบนสุด 1–2 วินาที
5. ค่อยๆ ลดลงมาช้าๆ (ช่วงปล่อยน้ำหนักลง 2–3 วินาที) จนเข่างอ ~90°
6. ทำซ้ำ ไม่ใช้แรงเหวี่ยง

**ข้อควรระวัง:**
- ไม่ต้องใช้น้ำหนักหนักเกิน — เน้นบีบต้นขาหน้าและควบคุมช่วงปล่อยน้ำหนักลง
- ⚠️ ข้อเท้าซ้ายไม่ได้รับภาระโดยตรงในท่านี้ → ปลอดภัย

## ท่าที่ 3: Dumbbell Romanian Deadlift — RDL (ยกดัมเบลแบบโรมาเนียน)

| รายละเอียด | ค่า |
|-----------|-----|
| **กล้ามเนื้อที่ฝึก** | กล้ามเนื้อต้นขาหลัง (Hamstrings), กล้ามเนื้อก้น (Gluteus Maximus), กล้ามเนื้อหลังล่าง (Erector Spinae) |
| **Sets × Reps** | 3 × 10–12 |
| **พัก** | 90 วินาที |
| **น้ำหนักเริ่มต้น** | 8 kg/ข้าง |

**ทำไมเลือกท่านี้:**
- ท่ารวมที่ฝึกต้นขาหลังและก้นพร้อมกัน ด้วยการพับตัวที่สะโพก (hip hinge)
- ใช้ทั้งสองขา (bilateral) → น้ำหนักกระจายเท่ากัน ปลอดภัยสำหรับข้อเท้าซ้าย

**วิธีทำ:**
1. ยืนตรง เท้ากว้างเท่าสะโพก จับ dumbbell หน้าต้นขา ฝ่ามือคว่ำ
2. เข่างอเล็กน้อย (ไม่ล็อกเข่า)
3. หายใจเข้า เกร็งท้อง **ดันสะโพกถอยหลัง** (พับตัวที่สะโพก ไม่ใช่ที่เอว)
4. ลำตัวเอนไปข้างหน้า dumbbell เลื่อนลงตามหน้าขา
5. ลงจนรู้สึกยืดที่ต้นขาหลัง (ประมาณระดับหน้าแข้งกลาง)
6. หลังตรงตลอด ไม่โค้งงอ
7. บีบก้น + ต้นขาหลัง ดันสะโพกกลับมาท่ายืน
8. หายใจออกขาขึ้น

**ข้อควรระวัง:**
- ⚠️ **ข้อเท้าซ้าย:** ท่านี้เป็นสองขา ไม่มีปัญหา แต่ให้กระจายน้ำหนักเท่ากันทั้งสองเท้า
- อย่าให้หลังโค้ง — ถ้ายืดหยุ่นไม่พอก็ไม่ต้องลงลึกมาก

## ท่าที่ 4: Cable Pull-Through (ดึงสายเคเบิลผ่านขา)

| รายละเอียด | ค่า |
|-----------|-----|
| **กล้ามเนื้อที่ฝึก** | กล้ามเนื้อก้น (Gluteus Maximus — เป้าหมายหลัก), กล้ามเนื้อต้นขาหลัง (Hamstrings) |
| **Sets × Reps** | 3 × 12–15 |
| **พัก** | 60 วินาที |
| **น้ำหนักเริ่มต้น** | 10 kg |

**ทำไมเลือกท่านี้:**
- เป็นท่าพับตัวที่สะโพก (hip hinge) เหมือน RDL แต่แรงดึงมาจากสาย Cable → แรงต้านคงที่ตลอดการเคลื่อนไหว
- เน้นก้นโดยเฉพาะ เสริมจาก RDL

**วิธีทำ:**
1. ปรับรอก Cable ต่ำสุด ใส่เชือก (rope attachment)
2. ยืนหันหลังให้เครื่อง Cable เท้ากว้างกว่าไหล่ จับเชือกระหว่างขา
3. ถอยออกมา 2–3 ก้าว ให้สายตึง
4. พับตัวที่สะโพก: ดันสะโพกถอยหลัง เข่างอเล็กน้อย ลำตัวเอนไปข้างหน้า
5. รู้สึกยืดที่ต้นขาหลังและก้น
6. **บีบก้นแรง** ดันสะโพกไปข้างหน้า กลับสู่ท่ายืนตรง
7. ค้างบีบก้น 1–2 วินาทีที่จุดบนสุด (ลำตัวตั้งตรง ไม่เอนหลัง)

**ข้อควรระวัง:**
- อย่าแอ่นหลังที่จุดบนสุด — ตั้งลำตัวตรงพอ
- เน้นรู้สึกก้นทำงาน ไม่ใช่หลังล่าง

## ท่าที่ 5: Standing Dumbbell Calf Raise สองขา (เขย่งน่องยืนถือดัมเบล)

| รายละเอียด | ค่า |
|-----------|-----|
| **กล้ามเนื้อที่ฝึก** | กล้ามเนื้อน่อง (Gastrocnemius — มัดใหญ่ + Soleus — มัดลึก) |
| **Sets × Reps** | 3 × 15–20 |
| **พัก** | 60 วินาที |
| **น้ำหนักเริ่มต้น** | 10 kg/ข้าง |

**ทำไมเลือกท่านี้:**
- ฝึกน่องด้วยท่ายืน (เข่าตรง) เน้นน่องมัดใหญ่ (Gastrocnemius)
- ทำสองขาพร้อมกัน กระจายน้ำหนักเท่ากัน

**วิธีทำ:**
1. ยืนตรง จับ dumbbell ทั้งสองมือข้างลำตัว
2. เท้ากว้างเท่าสะโพก ปลายเท้าตรงหรือหันออกเล็กน้อย
3. เขย่งขึ้นบนปลายเท้าทั้งสองข้าง จนน่องหดตัวเต็มที่
4. ค้างที่จุดบนสุด 1–2 วินาที
5. ค่อยๆ ลดลงมาช้าๆ (ช่วงปล่อยน้ำหนักลง 2–3 วินาที) จนส้นเท้าแตะพื้น

2. **แกว่งขาหน้า-หลัง (Leg Swing Front-Back)** — 10 ครั้ง/ข้าง, จับราวจับทรงตัว แกว่งขาไปหน้า-หลัง
3. **แกว่งขาเข้า-ออก (Leg Swing Side-to-Side)** — 10 ครั้ง/ข้าง, แกว่งขาเข้า-ออก
4. **Glute Bridge (ดันก้นขึ้น)** — 15 ครั้ง, นอนหงาย เข่างอ ดันก้นขึ้น บีบก้นค้าง 1 วินาที
5. **หมุนข้อเท้า (Ankle Circles)** — 10 รอบ/ข้าง/ทิศทาง (⚠️ ข้อเท้าซ้าย: ทำเบาๆ ในช่วงที่สบาย)
6. **Cat-Cow (แอ่น-โก่งหลัง)** — 8 ครั้ง

## ท่าที่ 1: Dumbbell Sumo Squat (สควอทขากว้าง)

| รายละเอียด | ค่า |
|-----------|-----|
| **กล้ามเนื้อที่ฝึก** | กล้ามเนื้อต้นขาหน้า (Quadriceps), กล้ามเนื้อต้นขาด้านใน (Adductors), กล้ามเนื้อก้น (Gluteus Maximus) |
| **Sets × Reps** | 3 × 10–12 |
| **พัก** | 90 วินาที |
| **น้ำหนักเริ่มต้น** | 12 kg (1 dumbbell) |

**ทำไมเลือกท่านี้:**
- ท่ายืนขากว้าง เน้นกล้ามเนื้อต้นขาด้านในและก้นมากกว่า squat ปกติ
- ต้องกระดกข้อเท้าน้อยกว่า squat แคบ → เหมาะกับข้อจำกัดข้อเท้าซ้าย

**วิธีทำ:**
1. ยืนเท้ากว้างมาก (กว้างกว่าไหล่ 1.5–2 เท่า) ปลายเท้าหันออก ~45°
2. จับ dumbbell ด้านบนแนวตั้ง ทั้งสองมือห้อยลงตรงกลาง (หรือจับที่หัว dumbbell ด้านบน)
3. อกยืด เกร็งท้อง
4. ย่อลงโดยดันเข่าออกตามแนวปลายเท้า สะโพกลง
5. ลงจนต้นขาขนานพื้นหรือลึกเท่าที่สบาย
6. ดันขึ้นผ่านส้นเท้า บีบก้น + ต้นขาด้านในที่ด้านบน

**ข้อควรระวัง:**
- ⚠️ **ข้อเท้าซ้าย:** Sumo stance ต้องกระดกข้อเท้าน้อยกว่า squat ปกติ → เหมาะกว่า แต่ถ้ารู้สึกไม่สบายให้ใช้แผ่นรองส้นเท้าเพิ่ม
- อย่าให้เข่าหุบเข้าใน

## ท่าที่ 2: Leg Extension (เครื่องเหยียดขา)

| รายละเอียด | ค่า |
|-----------|-----|
| **กล้ามเนื้อที่ฝึก** | กล้ามเนื้อต้นขาหน้า (Quadriceps — ท่าเดี่ยว เน้นเฉพาะต้นขาหน้า) |
| **Sets × Reps** | 3 × 12–15 |
| **พัก** | 60 วินาที |
| **น้ำหนักเริ่มต้น** | 15 kg |

**ทำไมเลือกท่านี้:**
- เป็นท่านั่งเหยียดขา ไม่ต้องยืนรับน้ำหนัก → ไม่ต้องใช้ข้อเท้าเลย ปลอดภัยสำหรับข้อเท้าซ้าย
- ฝึกต้นขาหน้าโดยเฉพาะ เสริมจาก Squat

**วิธีทำ:**
1. นั่งบนเครื่อง ปรับหลังพิงตรง สะโพกชิดพนักพิง
2. ปรับแผ่นกดให้อยู่ด้านหน้าข้อเท้า (เหนือเท้า)
3. จับที่จับข้างเบาะ
4. เหยียดเข่าขึ้นจนขาตรง บีบต้นขาหน้า (Quadriceps) ที่จุดบนสุด 1–2 วินาที
5. ค่อยๆ ลดลงมาช้าๆ (ช่วงปล่อยน้ำหนักลง 2–3 วินาที) จนเข่างอ ~90°
6. ทำซ้ำ ไม่ใช้แรงเหวี่ยง

**ข้อควรระวัง:**
- ไม่ต้องใช้น้ำหนักหนักเกิน — เน้นบีบต้นขาหน้าและควบคุมช่วงปล่อยน้ำหนักลง
- ⚠️ ข้อเท้าซ้ายไม่ได้รับภาระโดยตรงในท่านี้ → ปลอดภัย

## ท่าที่ 3: Dumbbell Stiff-Leg Deadlift (ยกดัมเบลขาเกือบตรง)

| รายละเอียด | ค่า |
|-----------|-----|
| **กล้ามเนื้อที่ฝึก** | กล้ามเนื้อต้นขาหลัง (Hamstrings — เน้นยืดมากกว่า RDL), กล้ามเนื้อก้น (Gluteus Maximus), กล้ามเนื้อหลังล่าง (Erector Spinae) |
| **Sets × Reps** | 3 × 10–12 |
| **พัก** | 90 วินาที |
| **น้ำหนักเริ่มต้น** | 8 kg/ข้าง |

**ทำไมเลือกท่านี้:**
- เข่าเกือบตรง (งอน้อยกว่า RDL) → ต้นขาหลังถูกยืดมากขึ้น → กระตุ้นการสร้างกล้ามเนื้อสูง
- ใช้สองขา ปลอดภัยสำหรับข้อเท้าซ้าย

**วิธีทำ:**
1. ยืนตรง เท้ากว้างเท่าสะโพก จับ dumbbell หน้าต้นขา
2. เข่า **เกือบตรง** (ไม่ล็อกเข่า แต่งอน้อยกว่า RDL)
3. พับตัวที่สะโพก: ดันสะโพกถอยหลัง ลำตัวเอนไปข้างหน้า
4. ลดลงช้าๆ จนรู้สึกยืดที่ต้นขาหลังอย่างชัดเจน
5. หลังตรงตลอด
6. บีบก้น + ต้นขาหลัง ดันกลับขึ้นมา

**ข้อควรระวัง:**
- ⚠️ **ข้อเท้าซ้าย:** เหมือน RDL — สองขา กระจายน้ำหนักเท่ากัน
- อย่าฝืนลงลึกถ้าต้นขาหลังยังไม่ยืดหยุ่นพอ — ช่วงการเคลื่อนไหวจะเพิ่มขึ้นเรื่อยๆ ตามเวลา
- ถ้ารู้สึกที่หลังล่างมากกว่าต้นขาหลัง → เช็ค form ว่าพับที่สะโพกจริงๆ (ไม่ใช่โค้งที่เอว)

## ท่าที่ 4: Cable Hip Abduction (กางขาด้วยสายเคเบิล)

| รายละเอียด | ค่า |
|-----------|-----|
| **กล้ามเนื้อที่ฝึก** | กล้ามเนื้อก้นด้านข้าง (Gluteus Medius — รักษาเสถียรภาพสะโพก), กล้ามเนื้อก้นส่วนเล็ก |
| **Sets × Reps** | 3 × 15/ข้าง |
| **พัก** | 60 วินาที (สลับข้างระหว่างพัก) |
| **น้ำหนักเริ่มต้น** | 5 kg |

**ทำไมเลือกท่านี้:**
- ฝึกกล้ามเนื้อก้นด้านข้างที่ช่วยรักษาเสถียรภาพขณะเดินและวิ่ง — มักอ่อนแอในคนนั่งโต๊ะ

**วิธีทำ:**
1. ปรับรอก Cable ต่ำสุด ใส่สายรัดข้อเท้า (ankle strap)
2. คล้องสายรัดที่ข้อเท้าข้างที่จะทำ ยืนด้านข้างของ Cable
3. จับราวจับหรือเครื่องเพื่อทรงตัว
4. ยืนตรง ขาที่คล้องสายอยู่ด้านไกลจาก Cable
5. กางขาออกด้านข้างช้าๆ จนรู้สึกก้นด้านข้างทำงาน (~30–45°)
6. ค้าง 1 วินาที
7. ค่อยๆ ลดลงมาช้าๆ ไม่ให้ขาแกว่ง
8. ทำครบแล้วสลับข้าง

**ข้อควรระวัง:**
- ⚠️ **ข้อเท้าซ้าย:** เมื่อทำขาซ้าย ระวังไม่ให้ข้อเท้าอยู่ในท่าที่ไม่สบาย ถ้าเจ็บให้ข้ามท่านี้
- ⚠️ **ขาที่ยืนรับน้ำหนัก:** เมื่อขาซ้ายเป็นขายืน ให้จับราวจับแน่น เพราะการทรงตัวอาจไม่ดี
- อย่าเอนลำตัวไปด้านข้าง — ยืนตรง ให้ก้นด้านข้างทำงาน

## ท่าที่ 5: Seated Calf Raise — วาง Dumbbell บนเข่า (เขย่งน่องนั่ง)

| รายละเอียด | ค่า |
|-----------|-----|
| **กล้ามเนื้อที่ฝึก** | กล้ามเนื้อน่องมัดลึก (Soleus — ทำงานหลักเมื่อเข่างอ) |
| **Sets × Reps** | 3 × 15–20 |
| **พัก** | 60 วินาที |
| **น้ำหนักเริ่มต้น** | 8 kg (1 dumbbell วางบนเข่า) |

**ทำไมเลือกท่านี้:**
- นั่ง (เข่างอ) ทำให้น่องมัดใหญ่หย่อน → น่องมัดลึก (Soleus) ทำงานเป็นหลัก
- Soleus เป็นกล้ามเนื้อแบบ slow-twitch (~80%) → ต้องฝึกด้วยจำนวนครั้งสูง (15–20)
- ต่างจากวันอังคารที่ฝึกน่องแบบยืน (เน้นน่องมัดใหญ่)

**วิธีทำ:**
1. นั่งบนม้านั่ง/เก้าอี้ เข่างอ 90° เท้าราบกับพื้น
2. วาง dumbbell บนเข่าทั้งสอง (หรือข้างละข้างเข่า)
3. ใช้ปลายเท้ากดดันขึ้น เขย่งส้นเท้าขึ้นจากพื้น
4. บีบน่อง 1–2 วินาทีที่จุดบนสุด
5. ค่อยๆ ลดลงมาช้าๆ จนส้นเท้าแตะพื้น

**ข้อควรระวัง:**
- ⚠️ **ข้อเท้าซ้าย:** ทำสองเท้า ถ้าเจ็บข้อเท้าซ้ายให้ลดช่วงการเคลื่อนไหวหรือน้ำหนัก
- ทำช้าๆ ต่อเนื่อง ไม่กระดอน

## คาร์ดิโอ — วัน Lower (15–20 นาที)

เหมือนวัน Upper: **Elliptical หรือลู่วิ่งเดิน** ที่ Zone 2 (ระดับเบา พูดเป็นประโยคได้) — 115–134 bpm

**วิธีทำ:**
1. เริ่ม 3 นาทีแรก pace เบาๆ (วอร์มอัพ)
2. เพิ่มความเร็ว/แรงต้านจนเข้า Zone 2 — รู้สึกออกแรงเล็กน้อย พูดเป็นประโยคได้
3. รักษาความเร็วคงที่ตลอด
4. 2 นาทีสุดท้าย ลดความเร็วลง (คูลดาวน์)

> **หมายเหตุ:** หลังฝึกขา ขาจะล้า — Elliptical มักสบายกว่าลู่วิ่ง เพราะกระแทกข้อต่อน้อยกว่า

## กฎการเพิ่มน้ำหนัก

เมื่อทำ **จำนวนครั้งสูงสุดของเป้าหมายครบทุก set** ได้ **2 รอบฝึกติดต่อกัน** → เพิ่มน้ำหนัก

| ประเภทท่า | น้ำหนักที่เพิ่ม |
|-----------|----------------|
| ท่ารวม (ใช้หลายกล้ามเนื้อ) เช่น Squat, RDL, Press | +2–2.5 kg |
| ท่าเดี่ยว (เน้นกล้ามเนื้อเดียว) เช่น Lateral Raise, Curl, Pushdown | +1–2 kg |

### ตัวอย่าง
- Goblet Squat เป้าหมาย: 3×10–12 @ 10 kg
- รอบที่ 1: ทำได้ 12, 12, 12 ✓
- รอบที่ 2: ทำได้ 12, 12, 12 ✓
- → รอบที่ 3: เพิ่มเป็น 12 kg → จำนวนครั้งอาจลดลงเป็น 10, 10, 9 → ค่อยสร้างจำนวนครั้งขึ้นมาใหม่

## Deload (สัปดาห์ลดความหนัก)
- **ทุก 4–6 สัปดาห์** ทำ deload 1 สัปดาห์
- ลดปริมาณฝึก 40–50%: ลดจำนวน set ลงครึ่ง (เช่น 3 set → 2 set) หรือลดน้ำหนัก 40%
- ยังคงมาฝึก 4 วัน ทำทุกท่า แต่เบาและน้อยลง
- เป้าหมาย: ให้ข้อต่อ เอ็น กล้ามเนื้อฟื้นตัว ก่อนเข้ารอบฝึกใหม่

## โภชนาการแนะนำเบื้องต้น

| รายการ | แนะนำ |
|--------|-------|
| **โปรตีน** | 1.6–2.0 g/kg/วัน = **120–150 g/วัน** |
| **Whey Protein** | 1 scoop หลังฝึก (~25g protein) |
| **แคลอรี** | เริ่มที่ maintenance ~2,100–2,200 kcal/วัน |
| **กลยุทธ์** | มือใหม่ + ไขมัน 26% → สามารถ **สร้างกล้ามเนื้อ + ลดไขมันพร้อมกัน** ได้ (body recomposition) |
| **เมื่อพร้อม** | ค่อยลดแคลอรีเล็กน้อย (-300 kcal) สำหรับลดไขมัน |

### เคล็ดลับง่ายๆ
- กินโปรตีนทุกมื้อ (ไข่ อกไก่ ปลา เต้าหู้ whey)
- ผักทุกมื้อ → ไฟเบอร์ช่วยอิ่มนาน
- ดื่มน้ำ 2–3 ลิตร/วัน
- นอน 7–9 ชั่วโมง → ฮอร์โมนการเจริญเติบโต + การฟื้นตัว

## หมายเหตุสำคัญ — ข้อจำกัดทางร่างกายและเมื่อไหร่ควรพบแพทย์

### สรุปข้อจำกัด
1. **ข้อเท้าซ้าย:** ห้ามท่าขาเดียว, ใช้แผ่นรองส้นเท้าขณะ squat, ทำสองขาเสมอ
2. **ข้อศอกซ้าย:** ห้ามวิดพื้น + ท่ายืดแขนหลังเหนือหัว, สังเกตอาการในท่าดันทุกท่า
3. **เดินน้อย:** เพิ่มก้าวเดินทีละนิด เป้าหมาย 5,000–7,000 ก้าว/วัน

### ควรพบแพทย์ / นักกายภาพบำบัด เมื่อ:
- เจ็บข้อเท้าซ้ายหรือข้อศอกซ้าย **เพิ่มขึ้น** จากการฝึก (ไม่ดีขึ้นภายใน 48 ชั่วโมง)
- เจ็บ **แบบแปลบ, ชา, หรือร้าวลงแขน/ขา** ขณะฝึก
- ข้อบวม แดง ร้อน หลังฝึก
- ทำท่าใดไม่ได้เลยเพราะเจ็บ ทั้งที่ลดน้ำหนักแล้ว
- ปวดที่ไม่เกี่ยวกับกล้ามเนื้อ (เช่น ปวดกระดูก ปวดข้อต่อลึกๆ)

### หลักทั่วไป
- **เจ็บข้อต่อ = หยุด, ล้ากล้ามเนื้อ = ปกติ** (ไม่ใช่ "เจ็บแปลว่าได้ผล")

## ข้อควรระวังและแนวทางปฏิบัติ

### มาตรวัดความเจ็บ (ใช้ทุกครั้งที่ฝึก)

| ระดับ | ความหมาย | ทำอย่างไร |
|-------|---------|----------|
| **0-3 จาก 10** | ไม่เจ็บ หรือ ตึงนิดหน่อย | ฝึกต่อได้ปกติ |
| **4-6 จาก 10** | เจ็บปานกลาง | ลดน้ำหนัก 20-30% หรือลดช่วงการเคลื่อนไหว ถ้ายังเจ็บ → ข้ามท่านี้ |
| **7+ จาก 10** | เจ็บมาก | **หยุดทันที** พักส่วนที่เจ็บ 2-3 วัน ถ้าไม่ดีขึ้น → พบแพทย์ |

### สัญญาณเตือน — ข้อเท้าซ้าย
- บวม/ร้อนหลังฝึก → ลดน้ำหนักสควอทลง 20% ในครั้งถัดไป
- เจ็บข้อเท้าตอนยกส้น → ลดช่วงยกหรือข้ามท่า
- หนุนส้นเท้าแล้วยังตึง → เพิ่มความสูงของส้น (3-4cm)

### สัญญาณเตือน — ข้อศอกซ้าย
- เจ็บศอกตอนกดดัมเบลนอนพื้น → ลองหมุนมือให้ฝ่ามือหันเข้าหากัน ถ้ายังเจ็บ → ลดน้ำหนัก
- เจ็บตอนเคิร์ลแขน → เปลี่ยนไปจับแบบฝ่ามือหันเข้าหากัน + ลดน้ำหนัก
- เจ็บตอนถีบแขนหลัง → ลดน้ำหนัก + เพิ่มจำนวนครั้ง

### หลักทั่วไป
- **อบอุ่นร่างกายทุกครั้ง** — ห้ามข้ามเด็ดขาด
- **ความเร็วในการทำท่า** — ปล่อยลง 2 วินาที หยุด 1 วินาที ยกขึ้น 2 วินาที
- **การหายใจ** — หายใจออกตอนออกแรง (ยกขึ้น/ดัน) หายใจเข้าตอนปล่อยลง
- **น้ำ** — ดื่มน้ำ 500ml ก่อนฝึก + จิบระหว่างฝึก

## วิธีทำแต่ละท่า (ทำช้าๆ: ปล่อยลง 2 วิ → หยุด 1 วิ → ยกขึ้น 2 วิ)

### ท่า 1: กดดัมเบลนอนพื้น (DB Floor Press)
**กล้ามเนื้อหลัก:** อก, ต้นแขนหลัง (หลังแขน)
**น้ำหนักเริ่มต้น:** 10 kg/ข้าง

1. นอนหงายบนพื้น งอเข่าขึ้น ฝ่าเท้าวางราบ
2. ถือดัมเบลทั้งสองมือ ยกขึ้นเหนืออก แขนตั้งตรง ฝ่ามือหันไปทางเท้า
3. ค่อยๆ งอศอกลง ปล่อยดัมเบลลงช้าๆ จนข้อศอกแตะพื้นเบาๆ (2 วินาที)
4. หยุดค้าง 1 วินาทีเมื่อศอกแตะพื้น
5. ดันดัมเบลขึ้นกลับไปจุดเริ่มต้น เกร็งหน้าอก (2 วินาที)
6. หายใจเข้าตอนลง หายใจออกตอนดันขึ้น

> **ข้อดี:** พื้นจะช่วยจำกัดไม่ให้ศอกงอลึกเกินไป ลดแรงกดที่ข้อศอก

**กล้ามเนื้อหลัก:** หลัง (กล้ามเนื้อปีก), กลางหลัง
**น้ำหนักเริ่มต้น:** 10-12 kg/ข้าง

1. ยืนเท้ากว้างเท่าไหล่ ถือดัมเบลทั้งสองมือ
2. งอเข่าเล็กน้อย ก้มตัวไปข้างหน้าประมาณ 45 องศา หลังตรง (ห้ามหลังค่อม)
3. ปล่อยแขนห้อยลงตรงๆ ดัมเบลอยู่ใต้อก
4. ดึงดัมเบลขึ้นมาข้างลำตัว โดยบีบสะบักเข้าหากัน (2 วินาที)
5. ค้างด้านบน 1 วินาที เกร็งหลัง
6. ค่อยๆ ปล่อยลง (2 วินาที) กลับจุดเริ่มต้น
7. หายใจออกตอนดึงขึ้น หายใจเข้าตอนปล่อยลง

> **จุดสำคัญ:** ดึงด้วยหลัง ไม่ใช่แขน ลองนึกว่า "ดึงศอกกลับ" แทนที่จะ "ยกมือขึ้น"

**น้ำหนักเริ่มต้น:** 5-7 kg/ข้าง

1. นั่งพื้น หลังตรง (พิงผนังได้ถ้าต้องการ)
2. ถือดัมเบลยกขึ้นระดับหน้า ฝ่ามือหันเข้าหาตัว ศอกงออยู่หน้าอก (เหมือนจุดสูงสุดของเคิร์ลแขน)
3. ค่อยๆ กางศอกออกด้านข้าง **พร้อมหมุนฝ่ามือออก** แล้วดันขึ้นเหนือหัว (2 วินาที)

**กล้ามเนื้อหลัก:** ไหล่ด้านหลัง, กลางหลังส่วนบน

2. ถือดัมเบลห้อยลงตรงๆ ใต้อก ฝ่ามือหันเข้าหากัน ศอกงอเล็กน้อย (อย่าเหยียดตรงสุด)
3. กางแขนออกด้านข้างเหมือนนกกางปีก จนแขนขนานพื้น (2 วินาที)
4. ค้างด้านบน 1 วินาที บีบสะบักเข้าหากัน
5. ค่อยๆ ปล่อยลงช้าๆ (2 วินาที)
6. หายใจออกตอนกางขึ้น หายใจเข้าตอนปล่อยลง

> **จุดสำคัญ:** ใช้น้ำหนักเบา ศอกงอเล็กน้อยค้างไว้ตลอด ไม่ต้องแกว่งตัว

### ท่า 5: เคิร์ลดัมเบลฝ่ามือหันเข้า (DB Hammer Curl)
**กล้ามเนื้อหลัก:** ต้นแขนหน้า (หน้าแขน + แขนท่อนล่าง)
**น้ำหนักเริ่มต้น:** 5-7 kg/ข้าง

2. **ฝ่ามือหันเข้าหากัน** (เหมือนถือค้อน) — ค้างตำแหน่งนี้ตลอดทั้งท่า
3. งอศอกยกดัมเบลขึ้นมาใกล้ไหล่ ข้อศอกแนบลำตัว ไม่แกว่ง (2 วินาที)
4. ค้างด้านบน 1 วินาที เกร็งหน้าแขน
5. ค่อยๆ ปล่อยลง (2 วินาที)
6. หายใจออกตอนยกขึ้น หายใจเข้าตอนปล่อยลง

> **จุดสำคัญ:** แขนท่อนบนแนบลำตัวตลอด ให้ศอกเป็นจุดหมุนเท่านั้น ห้ามแกว่งตัวช่วย

### ท่า 6: ถีบแขนหลังดัมเบล (DB Tricep Kickback)
**กล้ามเนื้อหลัก:** ต้นแขนหลัง (หลังแขน)
**น้ำหนักเริ่มต้น:** 3-5 kg/ข้าง

1. ยืนก้มตัวไปข้างหน้า งอเข่าเล็กน้อย (หรือจะวางมือข้างหนึ่งบนเก้าอี้ แล้วทำทีละข้างก็ได้)
2. ถือดัมเบล งอศอก 90 องศา แขนท่อนบนขนานพื้น ข้อศอกแนบลำตัว
3. เหยียดแขนตรงไปด้านหลังช้าๆ จนแขนตรง (2 วินาที)
4. ค้างตอนแขนตรง 1 วินาที เกร็งหลังแขน
5. ค่อยๆ งอศอกกลับมา 90 องศา (2 วินาที)
6. หายใจออกตอนเหยียดแขน หายใจเข้าตอนงอกลับ

> **จุดสำคัญ:** แขนท่อนบนอยู่นิ่งตลอด ขยับแค่แขนท่อนล่าง (ศอกเป็นจุดหมุน)

## วิธีทำแต่ละท่า (ทำช้าๆ: ปล่อยลง 2 วิ → หยุด 1 วิ → ยกขึ้น 2 วิ)

### ท่า 1: สควอทแบบอุ้มดัมเบล — หนุนส้นเท้า (DB Goblet Squat)
**กล้ามเนื้อหลัก:** ต้นขาหน้า, ก้น
**น้ำหนักเริ่มต้น:** 22 kg (ดัมเบลเดียว)

1. **เตรียม:** หาแผ่นน้ำหนัก หนังสือเล่มหนา หรือของที่สูงประมาณ 2-3cm วางบนพื้นเพื่อหนุนส้นเท้า
2. ยืนเท้ากว้างกว่าไหล่เล็กน้อย ปลายเท้าชี้ออกเล็กน้อย ส้นเท้าทั้งสองข้างวางบนที่หนุน
3. ถือดัมเบลตั้งขึ้น อุ้มไว้ที่หน้าอก มือจับหัวดัมเบลด้านบน
4. ค่อยๆ ย่อตัวลง ดันก้นไปข้างหลัง เข่าชี้ไปทิศเดียวกับปลายเท้า (2 วินาที)
5. ย่อลงจนต้นขาขนานพื้น (หรือลงได้เท่าที่สบาย)
6. ค้าง 1 วินาที
7. ดันตัวขึ้นกลับท่ายืน เกร็งต้นขาและก้น (2 วินาที)
8. หายใจเข้าตอนย่อลง หายใจออกตอนดันขึ้น

> **หนุนส้นเท้าทำไม?** เพราะข้อเท้าซ้ายงอได้น้อย การหนุนส้นช่วยให้ย่อตัวได้ลึกขึ้นโดยไม่ต้องงอข้อเท้ามาก

---

### ท่า 2: ยกดัมเบลจากพื้นแบบขาตึง (DB Romanian Deadlift)
**กล้ามเนื้อหลัก:** ต้นขาหลัง, ก้น
**น้ำหนักเริ่มต้น:** 15 kg/ข้าง

1. ยืนเท้ากว้างเท่าสะโพก ถือดัมเบลสองมือไว้หน้าต้นขา ฝ่ามือหันเข้าหาตัว
2. งอเข่าเล็กน้อย (แล้วล็อกไว้ ไม่งอเพิ่ม)
3. ค่อยๆ ก้มตัวไปข้างหน้า ดันก้นไปข้างหลัง ดัมเบลเลื่อนลงตามขา **หลังตรงตลอด** (2 วินาที)
4. ก้มลงจนรู้สึกตึงต้นขาหลัง (ประมาณดัมเบลถึงระดับหน้าแข้ง)
5. ค้าง 1 วินาที
6. เกร็งก้นดันสะโพกไปข้างหน้า ยืดตัวขึ้นกลับท่ายืน (2 วินาที)
7. หายใจเข้าตอนก้มลง หายใจออกตอนยืดขึ้น

> **จุดสำคัญ:** นี่คือท่าก้มตัว ไม่ใช่ท่าย่อตัว เข่าแค่งอนิดเดียวแล้วค้างไว้ ให้ส่วนก้มมาจากสะโพก

---

### ท่า 3: ยกสะโพกนอนพื้น — ดัมเบลวางบนสะโพก (Glute Bridge)
**กล้ามเนื้อหลัก:** ก้น
**น้ำหนักเริ่มต้น:** 10-15 kg (ดัมเบลเดียว)

1. นอนหงายบนพื้น งอเข่าขึ้น ฝ่าเท้าวางราบ เท้ากว้างเท่าสะโพก
2. วางดัมเบลบนกระดูกสะโพก (ตรงข้อพับต้นขากับท้อง) ใช้มือประคองดัมเบลไว้
3. เกร็งก้น ดันสะโพกขึ้นจนลำตัวตั้งแต่ไหล่ถึงเข่าเป็นเส้นตรง (2 วินาที)
4. ค้างด้านบน 1 วินาที บีบก้นให้แน่น
5. ค่อยๆ ปล่อยสะโพกลง (2 วินาที)
6. หายใจออกตอนดันขึ้น หายใจเข้าตอนปล่อยลง

> **จุดสำคัญ:** อย่าดันสูงจนหลังแอ่น ให้เป็นเส้นตรงจากไหล่ถึงเข่าพอ

---

### ท่า 4: สควอทขากว้าง (DB Sumo Squat)
**กล้ามเนื้อหลัก:** ต้นขาหน้า, ต้นขาด้านใน, ก้น
**น้ำหนักเริ่มต้น:** 15-20 kg (ดัมเบลเดียว)

1. ยืนขากว้างกว่าไหล่มาก ปลายเท้าชี้ออกด้านข้างประมาณ 45 องศา
2. ถือดัมเบลตั้งขึ้น สองมือจับหัวดัมเบลด้านบน ห้อยลงตรงกลางตัว
3. ค่อยๆ ย่อตัวลง เข่าชี้ไปทิศเดียวกับปลายเท้า หลังตรง (2 วินาที)
4. ย่อลงจนต้นขาขนานพื้น
5. ค้าง 1 วินาที
6. ดันตัวขึ้น เกร็งต้นขาและก้น (2 วินาที)
7. หายใจเข้าตอนย่อลง หายใจออกตอนดันขึ้น

> **ข้อดี:** ขากว้างทำให้ข้อเท้าไม่ต้องงอมาก เหมาะกับข้อเท้าที่มีปัญหา

---

### ท่า 5: ยกส้นเท้ายืน — ดัมเบลสองมือ (Standing Calf Raise)
**กล้ามเนื้อหลัก:** น่อง
**น้ำหนักเริ่มต้น:** 10-12 kg/ข้าง

1. ยืนตรง ถือดัมเบลทั้งสองมือห้อยข้างลำตัว เท้ากว้างเท่าสะโพก
2. ค่อยๆ เขย่งปลายเท้าขึ้น ยกส้นเท้าให้สูงที่สุดเท่าที่ทำได้ (2 วินาที)
3. ค้างด้านบน 1 วินาที เกร็งน่อง
4. ค่อยๆ ลดส้นเท้าลง (2 วินาที)
5. หายใจออกตอนเขย่งขึ้น หายใจเข้าตอนลง

> **ถ้าเจ็บข้อเท้า:** ลดช่วงเขย่ง (ไม่ต้องสูงสุด) หรือข้ามท่านี้

---

### ท่า 6: แมลงตาย — ฝึกแกนกลางลำตัว (Dead Bug)
**กล้ามเนื้อหลัก:** กล้ามเนื้อหน้าท้อง, แกนกลางลำตัว
**น้ำหนัก:** ไม่ใช้น้ำหนัก

1. นอนหงาย ยกแขนทั้งสองตั้งตรงขึ้นเหนือหน้าอก
2. ยกขาขึ้น งอเข่า 90 องศา (ต้นขาตั้งตรง หน้าแข้งขนานพื้น)
3. **กดหลังส่วนล่างแนบพื้นตลอด** (สำคัญมาก)
4. ค่อยๆ ยืดแขนขวาไปด้านหลัง (เหนือหัว) พร้อมกับยืดขาซ้ายออกตรง ลงไปใกล้พื้น (แต่ไม่แตะ)
5. ค้าง 1 วินาที
6. ดึงกลับมาจุดเริ่มต้น
7. สลับข้าง — แขนซ้าย + ขาขวา
8. หายใจออกตอนยืดแขน-ขาออก หายใจเข้าตอนดึงกลับ

> **จุดสำคัญ:** หลังส่วนล่างต้องแนบพื้นตลอด ถ้าหลังลอย = ท่าผิด ลดช่วงการเคลื่อนไหวลง

## คลายกล้ามเนื้อ (Cool Down — 5-7 นาที)

ค้างแต่ละท่า **20-30 วินาที** ยืดช้าๆ ไม่กระตุก

### 1. ยืดต้นขาหน้า
- ยืนขาเดียว (จับกำแพงช่วยทรงตัว) งอเข่าจับข้อเท้าดึงส้นเท้าเข้าหาก้น
- รู้สึกตึงต้นขาหน้า
- ทำทั้งสองข้าง

### 2. ยืดต้นขาหลัง
- นั่งพื้น เหยียดขาตรง ก้มตัวเอื้อมมือไปจับปลายเท้า (หรือหน้าแข้ง)
- รู้สึกตึงต้นขาหลัง
- ห้ามกระตุก ค่อยๆ ก้ม

### 3. ยืดสะโพก (ท่านกพิราบ)
- นั่งพื้น พับขาข้างหนึ่งไว้หน้าตัว เหยียดอีกข้างไปด้านหลัง
- ค่อยๆ ก้มตัวลง รู้สึกตึงสะโพกขาหน้า
- ทำทั้งสองข้าง
- (ถ้าทำไม่ได้ ให้นั่งเก้าอี้ ยกข้อเท้าวางบนเข่าอีกข้าง แล้วกดเข่าลงเบาๆ)

6. ค้าง 1 วินาที
7. ดันตัวขึ้น เกร็งต้นขาและก้น (2 วินาที)
8. หายใจเข้าตอนย่อลง หายใจออกตอนดันขึ้น

> **ต่างจากวันอังคาร:** วันนี้ทำมากกว่า (12-15 ครั้ง) แต่น้ำหนักเบากว่า เพื่อฝึกความทนทานของกล้ามเนื้อ

---

### ท่า 3: ดันสะโพกพิงผนัง — ดัมเบลวางบนสะโพก (DB Hip Thrust)
**กล้ามเนื้อหลัก:** ก้น
**น้ำหนักเริ่มต้น:** 10-15 kg (ดัมเบลเดียว)

1. นั่งพื้น เอาหลังส่วนบน (ช่วงสะบัก) พิงขอบโซฟา/เก้าอี้แข็ง/ผนัง
2. งอเข่า ฝ่าเท้าวางราบบนพื้น เท้ากว้างเท่าสะโพก
3. วางดัมเบลบนกระดูกสะโพก ใช้มือประคอง
4. เกร็งก้น ดันสะโพกขึ้นจนลำตัวตั้งแต่ไหล่ถึงเข่าเป็นเส้นตรง (2 วินาที)
5. ค้างด้านบน 1 วินาที บีบก้นให้แน่น
6. ค่อยๆ ปล่อยสะโพกลง (2 วินาที)
7. หายใจออกตอนดันขึ้น หายใจเข้าตอนปล่อยลง

> **ถ้าไม่มีของพิง:** ให้ทำท่ายกสะโพกนอนพื้น (เหมือนวันอังคาร) แทนได้เลย

---

### ท่า 4: ยกดัมเบลจากพื้นขาตรง (DB Stiff-Leg Deadlift)
**กล้ามเนื้อหลัก:** ต้นขาหลัง (เน้นยืดมากกว่า), ก้น
**น้ำหนักเริ่มต้น:** 12-15 kg/ข้าง

1. ยืนเท้ากว้างเท่าสะโพก ถือดัมเบลสองมือหน้าต้นขา
2. **ขาเหยียดตรง** (หรืองอเข่าน้อยมากๆ — น้อยกว่าวันอังคาร)
3. ค่อยๆ ก้มตัวไปข้างหน้า ดัมเบลเลื่อนลงตามขา หลังตรงตลอด (2 วินาที)
4. ก้มลงจนรู้สึกตึงต้นขาหลัง**มาก** (จะตึงกว่าวันอังคารเพราะเข่าตรงกว่า)
5. ค้าง 1 วินาที
6. เกร็งก้น ดันสะโพกไปข้างหน้า ยืดตัวขึ้น (2 วินาที)
7. หายใจเข้าตอนก้มลง หายใจออกตอนยืดขึ้น

> **ต่างจากวันอังคาร:** วันอังคารเข่างอนิดหนึ่ง (เน้นก้น) วันนี้ขาตรงกว่า (เน้นยืดต้นขาหลัง)

---

### ท่า 5: ยกส้นเท้านั่ง — ดัมเบลวางบนเข่า (Seated Calf Raise)
**กล้ามเนื้อหลัก:** น่องส่วนลึก
**น้ำหนักเริ่มต้น:** 10-15 kg/เข่า

1. นั่งบนเก้าอี้หรือนั่งพื้น (เข่างอ 90 องศา ฝ่าเท้าวางราบ)
2. วางดัมเบลบนเข่าแต่ละข้าง ใช้มือประคอง
3. ค่อยๆ เขย่งปลายเท้าขึ้น ยกส้นเท้าให้สูง (2 วินาที)
4. ค้างด้านบน 1 วินาที เกร็งน่อง
5. ค่อยๆ ลดลง (2 วินาที)
6. ทำ 20-25 ครั้ง (มากกว่าวันอังคาร เพราะน่องส่วนลึกต้องการจำนวนครั้งสูง)

> **ต่างจากวันอังคาร:** วันอังคารยืน (เน้นน่องส่วนนอก) วันนี้นั่ง (เน้นน่องส่วนลึก) ทำจำนวนมากกว่า

---

### ท่า 6: แพลงก์ — ท่ากระดาน (Plank)
**กล้ามเนื้อหลัก:** แกนกลางลำตัว, หน้าท้อง
**น้ำหนัก:** ไม่ใช้น้ำหนัก

1. นอนคว่ำ ยกตัวขึ้นด้วยข้อศอกและปลายเท้า
2. ข้อศอกอยู่ตรงใต้ไหล่ แขนท่อนล่างวางราบบนพื้น
3. ลำตัวตรงเป็นเส้นเดียว ตั้งแต่หัวถึงส้นเท้า
4. **เกร็งหน้าท้อง** และ **บีบก้น** ค้างไว้
5. ค้าง 30-45 วินาที
6. หายใจสม่ำเสมอ อย่ากลั้นหายใจ

> **จุดสำคัญ:** ห้ามก้นยกสูง ห้ามหลังแอ่น ลำตัวต้องตรงตลอด ถ้าทำ 30 วินาทีไม่ไหว → เริ่มที่ 15-20 วินาทีก่อน

## คลายกล้ามเนื้อ (Cool Down — 5-7 นาที)

ค้างแต่ละท่า **20-30 วินาที** ยืดช้าๆ ไม่กระตุก

### 1. ยืดต้นขาหน้า
- ยืนขาเดียว (จับกำแพงช่วยทรงตัว) งอเข่าจับข้อเท้าดึงส้นเท้าเข้าหาก้น
- รู้สึกตึงต้นขาหน้า
- ทำทั้งสองข้าง

### 2. ยืดต้นขาหลัง
- นั่งพื้น เหยียดขาตรง ก้มตัวเอื้อมมือไปจับปลายเท้า (หรือหน้าแข้ง)
- รู้สึกตึงต้นขาหลัง
- ห้ามกระตุก ค่อยๆ ก้ม

### 3. ยืดสะโพก (ท่านกพิราบ)
- นั่งพื้น พับขาข้างหนึ่งไว้หน้าตัว เหยียดอีกข้างไปด้านหลัง
- ค่อยๆ ก้มตัวลง รู้สึกตึงสะโพกขาหน้า
- ทำทั้งสองข้าง
- (ถ้าทำไม่ได้ ให้นั่งเก้าอี้ ยกข้อเท้าวางบนเข่าอีกข้าง แล้วกดเข่าลงเบาๆ)

### 4. ยืดน่อง
- ยืนหน้ากำแพง วางมือบนกำแพง ก้าวเท้าข้างหนึ่งไปด้านหลัง ส้นเท้าแนบพื้น
- ดันสะโพกไปข้างหน้า รู้สึกตึงน่องขาหลัง
- ทำทั้งสองข้าง

### 5. ยืดหลังส่วนล่าง (ท่าเด็ก)
- คุกเข่า นั่งบนส้นเท้า ก้มตัวเหยียดแขนไปข้างหน้า หน้าผากแตะพื้น
- ค้าง 20-30 วินาที รู้สึกยืดหลังส่วนล่าง`
                }
            ]
        };

        let currentContext = 'gym';
        let currentIndex = 0;

        function renderNav() {
            const list = document.getElementById('navList');
            list.innerHTML = '';
            
            RAW_DATA[currentContext].forEach((item, index) => {
                const li = document.createElement('li');
                li.className = 'nav-item';
                
                const btn = document.createElement('button');
                btn.className = `nav-btn ${index === currentIndex ? 'active' : ''}`;
                btn.textContent = item.title;
                btn.onclick = () => switchTab(index);
                
                li.appendChild(btn);
                list.appendChild(li);
            });
        }

        function renderContent() {
            const container = document.getElementById('content');
            const markdown = RAW_DATA[currentContext][currentIndex].content;
            
            // Check if marked is loaded
            if (typeof marked !== 'undefined') {
                container.innerHTML = marked.parse(markdown);
            } else {
                // Fallback if CDN fails or offline without cache
                container.innerHTML = `<p style="color:red">Error: Markdown parser failed to load. Please check your internet connection.</p><pre>${markdown}</pre>`;
            }
        }

        function switchContext(context) {
            currentContext = context;
            currentIndex = 0; // Reset to first item
            
            // Update context buttons
            document.querySelectorAll('.context-btn').forEach(btn => {
                btn.classList.toggle('active', btn.textContent.toLowerCase() === context);
            });

            renderNav();
            renderContent();
        }

        function switchTab(index) {
            currentIndex = index;
            renderNav();
            renderContent();
            
            // Scroll to top on mobile
            if (window.innerWidth <= 768) {
               window.scrollTo(0, 0);
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderNav();
            renderContent();
        });
    </script>
